<!DOCTYPE html>
<html>
<head>
    <title>HomeTech Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* LEFT SIDE (LOGIN FORM) */
        .left {
            width: 40%;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px;
        }

        .left h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            padding: 12px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #34495e;
        }

        /* RIGHT SIDE (LOGO + TEXT) */
        .right {
            width: 60%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #eaf0f6;
            text-align: center;
        }

        .logo {
            font-size: 80px;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            margin-top: 10px;
        }

        .subtitle {
            font-size: 16px;
            color: gray;
        }

        /* TOP BAR */
        .topbar {
            position: absolute;
            top: 0;
            width: 100%;
            height: 40px;
            background: #dfe6e9;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="topbar">
        <div>HomeTech Solutions Billing System</div>
        <div>— □ ✕</div>
    </div>

    <div class="container">
        
        <!-- LEFT SIDE -->
        <div class="left">
            <h2>Login</h2>

            <form method="post" action="/login">
                <label>Username:</label>
                <input type="text" name="username" required>

                <label>Password:</label>
                <input type="password" name="password" required>

                <button type="submit">Login</button>
            </form>
        </div>

        <!-- RIGHT SIDE -->
        <div class="right">
            <div class="logo">🏠</div>
            <div class="title">HomeTech Solutions</div>
            <div class="subtitle">Billing and Invoicing System</div>
        </div>

    </div>

</body>
</html>
