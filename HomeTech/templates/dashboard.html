<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        display: flex;
        background: #f4f6f9;
    }

    /* Sidebar */
    .sidebar {
        width: 220px;
        height: 100vh;
        background: #2c3e50;
        color: white;
        padding: 20px;
    }

    .sidebar h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    .sidebar a {
        display: block;
        padding: 12px;
        margin: 5px 0;
        color: white;
        text-decoration: none;
        border-radius: 5px;
    }

    .sidebar a:hover {
        background: #34495e;
    }

    /* Main */
    .main {
        flex: 1;
        padding: 20px;
    }

    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .header h1 {
        margin: 0;
    }

    /* Cards */
    .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-top: 20px;
    }

    .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .card h3 {
        margin: 0;
        font-size: 18px;
        color: #555;
    }

    .card p {
        font-size: 24px;
        margin-top: 10px;
        font-weight: bold;
        color: #2c3e50;
    }

    /* Activity Section */
    .activity {
        margin-top: 30px;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .activity h2 {
        margin-bottom: 15px;
    }

    .activity ul {
        list-style: none;
        padding: 0;
    }

    .activity li {
        padding: 10px;
        border-bottom: 1px solid #ddd;
    }
</style>

</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>Menu</h2>
    <a href="#">Dashboard</a>
    <a href="#">Customer</a>
    <a href="#">Products</a>
    <a href="#">Sales</a>
    <a href="#">Billing</a>
    <a href="#">Payments</a>
    <a href="#">Reports</a>
    <a href="#">Users</a>
    <a href="#">Logout</a>
</div>

<!-- Main Dashboard -->
<div class="main">

    <div class="header">
        <h1>Dashboard</h1>
    </div>

    <!-- Summary Cards -->
    <div class="cards">
        <div class="card">
            <h3>Total Customers</h3>
            <p>0</p>
        </div>

        <div class="card">
            <h3>Total Sales</h3>
            <p>₱0</p>
        </div>

        <div class="card">
            <h3>Products</h3>
            <p>0</p>
        </div>

        <div class="card">
            <h3>Pending Payments</h3>
            <p>0</p>
        </div>
    </div>

    <!-- Recent Activity -->
    <div class="activity">
        <h2>Recent Activity</h2>
        <ul>
            <li>New customer added</li>
            <li>Payment received</li>
            <li>Product updated</li>
            <li>Invoice generated</li>
        </ul>
    </div>

</div>

</body>
</html>
